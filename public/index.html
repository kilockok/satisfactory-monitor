<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-label">SATISFACTORY</span>
        <span class="topbar-sub">DEDICATED SERVER</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">--</span>
        <span class="topbar-sep">|</span>
        <span class="update-text" id="updateText">--</span>
      </div>
    </header>

    <section class="metrics">
      <div class="metric-card">
        <div class="metric-label">PLAYERS</div>
        <div class="metric-value" id="players">-- / --</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">TICK RATE</div>
        <div class="metric-value" id="tickRate">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">TECH TIER</div>
        <div class="metric-value" id="techTier">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">UPTIME</div>
        <div class="metric-value" id="uptime">--</div>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-header">
        <span class="section-label">TICK RATE</span>
        <div class="range-tabs" id="tickRangeTabs">
          <button class="range-btn" data-range="1h">1h</button>
          <button class="range-btn active" data-range="2h">2h</button>
          <button class="range-btn" data-range="12h">12h</button>
          <button class="range-btn" data-range="1d">1d</button>
          <button class="range-btn" data-range="7d">7d</button>
          <button class="range-btn" data-range="30d">30d</button>
          <button class="range-btn" data-range="90d">90d</button>
        </div>
      </div>
      <div class="chart-wrap" id="tickChartWrap"></div>
    </section>

    <section class="chart-section">
      <div class="section-header">
        <span class="section-label">PLAYERS</span>
        <div class="range-tabs" id="playerRangeTabs">
          <button class="range-btn" data-range="1h">1h</button>
          <button class="range-btn active" data-range="2h">2h</button>
          <button class="range-btn" data-range="12h">12h</button>
          <button class="range-btn" data-range="1d">1d</button>
          <button class="range-btn" data-range="7d">7d</button>
          <button class="range-btn" data-range="30d">30d</button>
          <button class="range-btn" data-range="90d">90d</button>
        </div>
      </div>
      <div class="chart-wrap" id="playerChartWrap"></div>
    </section>

    <section class="details">
      <div class="section-header">
        <span class="section-label">SESSION</span>
      </div>
      <div class="detail-grid">
        <div class="detail-row">
          <span class="detail-key">Session</span>
          <span class="detail-val" id="sessionName">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Phase</span>
          <span class="detail-val" id="gamePhase">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Schematic</span>
          <span class="detail-val" id="schematic">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Status</span>
          <span class="detail-val" id="gameStatus">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">Auto Load</span>
          <span class="detail-val" id="autoLoad">--</span>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
